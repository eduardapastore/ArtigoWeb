<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artigos Web</title>

  <link rel="stylesheet" href="style.css">

  <!-- SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <h1>Sistema de Gerenciamento de Artigos</h1>

  <div class="container">

    <!-- ARTIGOS -->
    <div class="card">
      <h2>Artigos</h2>

      <table>
        <thead>
          <tr>
            <th>Título</th>
            <th>Descrição</th>
          </tr>
        </thead>

        <tbody id="tabelaArtigos"></tbody>
      </table>
    </div>

    <!-- AUTORES -->
    <div class="card">
      <h2>Autores</h2>

      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>Email</th>
          </tr>
        </thead>

        <tbody id="tabelaAutores"></tbody>
      </table>
    </div>

    <!-- PALAVRAS-CHAVE -->
    <div class="card">
      <h2>Palavras-Chave</h2>

      <table>
        <thead>
          <tr>
            <th>Palavra</th>
          </tr>
        </thead>

        <tbody id="tabelaPalavras"></tbody>
      </table>
    </div>

    <!-- REFERÊNCIAS -->
    <div class="card">
      <h2>Referências</h2>

      <table>
        <thead>
          <tr>
            <th>Referência</th>
          </tr>
        </thead>

        <tbody id="tabelaReferencias"></tbody>
      </table>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
